<!DOCTYPE html>
<html>
  
  <head>
    <base target="_top">

    <base target="_top">
    <meta charset="utf-8">
    <title>Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
  .form-card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    padding: 30px;
    margin-top: 20px;
    margin-bottom: 20px;
  }
  .form-card h3 {
    color: #333;
    margin-bottom: 30px;
  }
  .btn-primary {
    background-color: #0d6efd;
    border: none;
    border-radius: 8px;
    padding: 10px 30px;
    font-weight: 500;
    transition: all 0.3s ease;
  }
  .btn-primary:hover {
    background-color: #0b5ed7;
    box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
    transform: translateY(-2px);
  }
</style>
  
  </head>
  <body>
    
    <div class="container">
  <div class="form-card mx-auto" style="max-width: 800px;">
    <h3 class="text-center fw-bold">Form Permohonan Perbaikan</h3>
    <hr class="mb-4">
    <form id="contactForm" class="php-email-form">
      <div class="row gy-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nama Pelapor</label>
          <input type="text" name="nama" id="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="col-md-6 mt-3">
          <label class="form-label fw-semibold">WhatsApp</label>
          <input type="text" name="whatsapp" id="whatsapp" class="form-control" required>
        </div>
        <div class="col-md-6 mt-3">
          <label class="form-label fw-semibold">Bagian / Kejuruan</label>
          <input type="text" name="bagian" id="bagian" class="form-control" required>
        </div>
        <div class="col-md-6 mt-3">
          <label class="form-label fw-semibold">Lokasi</label>
          <input type="text" name="lokasi" id="lokasi" class="form-control" placeholder="Ruangan / Lantai" required>
        </div>
        <div class="col-md-6 mt-3">
          <label class="form-label fw-semibold">Kategori Kerusakan</label>
          <select name="kategori" id="kategori" class="form-select custom-select" required>
            <option value="">Pilih Kategori...</option>
          </select>
        </div>
        <div class="col-md-12 mt-3">
          <label class="form-label fw-semibold">Deskripsi Kerusakan</label>
          <textarea class="form-control" name="deskripsi" id="deskripsi" rows="4" placeholder="Jelaskan detail kerusakan yang terjadi" required></textarea>
        </div>
        <!-- Input File -->
        <div class="col-md-12 mt-3">
          <label class="form-label fw-semibold">Bukti Foto / Dokumen (Opsional)</label>
          <div class="custom-file">
            <input type="file" class="custom-file-input" id="customFile" accept="image/*,.pdf"> 
            <label class="custom-file-label" for="customFile" id="bukti">Pilih file...</label>
          </div>
        </div>
        <div class="col-md-12 text-center mt-5">
          <button type="button" onclick="kirimData()" class="btn btn-primary btn-lg w-100">
            Kirim Laporan
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
function kirimData() {
  const btnSubmit = document.querySelector('button[onclick="kirimData()"]');
  const btnOriginalText = btnSubmit.innerText;
  btnSubmit.innerText = "Mengirim...";
  btnSubmit.disabled = true;

  const fileInput = document.getElementById('customFile');
  
  const data = {
    nama: document.getElementById('nama').value,
    whatsapp: document.getElementById('whatsapp').value,
    lokasi: document.getElementById('lokasi').value,
    bagian: document.getElementById('bagian').value,
    kategori: document.getElementById('kategori').value,
    deskripsi: document.getElementById('deskripsi').value
  };

  if (fileInput.files.length > 0) {
    const fileItem = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
      data.fileData = e.target.result;
      data.fileName = fileItem.name;
      data.mimeType = fileItem.type;
      kirimKeServer(data, btnSubmit, btnOriginalText);
    };

    reader.readAsDataURL(fileItem);
  } else {
    data.fileData = "";
    kirimKeServer(data, btnSubmit, btnOriginalText);
  }
}

function kirimKeServer(dataObject, btnSubmit, btnOriginalText) {
  google.script.run
    .withSuccessHandler(function(response) {
      alert(response.message);
      document.getElementById('contactForm').reset();

      btnSubmit.innerText = btnOriginalText;
      btnSubmit.disabled = false;
      document.getElementById('bukti').innerText = "Choose file";
    })
    .withFailureHandler(function(error) {
      alert('Terjadi kesalahan: ' + error.message);
      btnSubmit.innerText = btnOriginalText;
      btnSubmit.disabled = false;
    })
    .simpanLaporan(dataObject);
}

function bukaTabelUI(namaMenu) {
  sessionStorage.setItem('halamanTerakhir', namaMenu);

  let menuSedangAktif = namaMenu;
  document.getElementById("wadahUtama").style.display = "none";
  document.getElementById("wadahTabelUI").style.display = "block";
}

function kembaliKeHome() {
  sessionStorage.removeItem('halamanTerakhir');

  document.getElementById("wadahTabelUI").style.display = "none";
  document.getElementById("wadahUtama").style.display = "block";
}

document.addEventListener("DOMContentLoaded", function () {

  google.script.run
    .withSuccessHandler(function(kategoriList) {
      var select = document.getElementById("kategori");

      kategoriList.forEach(function(item) {
        var option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        select.appendChild(option);
      });
    })
    .getKategori();

  let halamanTerakhir = sessionStorage.getItem('halamanTerakhir');
  if (halamanTerakhir && typeof bukaTabelUI === "function") {
    bukaTabelUI(halamanTerakhir);
  }

  const elFile = document.getElementById('customFile');
  if (elFile) {
    elFile.addEventListener('change', function(e) {
      if (e.target.files.length > 0) {
        document.getElementById('bukti').innerText = e.target.files[0].name;
      } else {
        document.getElementById('bukti').innerText = "Choose file";
      }
    });
  }

});
</script>

  </body>
</html>
