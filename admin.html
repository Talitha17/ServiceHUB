  <style>

<body>

  <div class="projects-container">
    <div class="projects-header">
      <div class="header-title">
        <span class="header-icon">⋮</span>
        Data Laporan
      </div>

      <div class="search-container">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Cari ID Laporan..." 
            onkeyup="filterTabel()"
          >
        </div>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead id="headTabelSederhana"></thead>
        <tbody id="bodyTabelSederhana">
          <tr>
            <td colspan="10" class="loading-text">
              <i class="fas fa-spinner fa-spin"></i> Memuat data...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>


<div class="modal fade" id="modalEditLaporan" tabindex="-1" aria-labelledby="modalEditLabel" aria-hidden="true" style="text-align: left;">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold text-dark" id="modalEditLabel">Ubah Status Laporan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-dark">
        <!-- Menyimpan ID secara rahasia -->
        <input type="hidden" id="editLaporanId">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Pilih Status Baru</label>
          <select class="form-control" id="editLaporanStatus" style="font-size: 16px;">
            <option value="Menunggu">Menunggu</option>
            <option value="Diproses">Diproses</option>
            <option value="Selesai">Selesai</option>
            <option value="Ditolak">Ditolak</option>
          </select>
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">Keterangan Tambahan</label>
          <textarea class="form-control" id="editLaporanKet" rows="4" placeholder="Misal: Teknisi sedang meluncur ke lokasi..." style="font-size: 16px;"></textarea>
        </div>
        
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-success" onclick="simpanEditKeServer()">Simpan Perubahan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function initHalaman() {
      muatUlangTabel();
    }

    function muatUlangTabel() {
      document.getElementById("headTabelSederhana").innerHTML = "";

      document.getElementById("bodyTabelSederhana").innerHTML = `
        <tr>
          <td colspan="10" class="loading-text">
            <i class="fas fa-spinner fa-spin"></i> Memuat data laporan...
          </td>
        </tr>
      `;

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
  .withSuccessHandler(renderTabelDinamisMurni)
  .withFailureHandler(function(err){
    console.log(err);
    document.getElementById("bodyTabelSederhana").innerHTML = `
      <tr>
        <td colspan="10" class="loading-text">
          Gagal memuat data: ${err.message}
        </td>
      </tr>
    `;
  })
  .getDataAdmin();
      }
    }

    function renderTabelDinamisMurni(dataMentah2D) {
      if (!dataMentah2D || dataMentah2D.length < 2) {
        document.getElementById("bodyTabelSederhana").innerHTML = `
          <tr>
            <td colspan="15" class="loading-text">
              Tidak ditemukan data.
            </td>
          </tr>
        `;
        return;
      }

      let headerHTML = "<tr>";
      dataMentah2D[0].forEach(judul => {
        headerHTML += `<th>${judul}</th>`;
      });
      headerHTML += `<th class="align-middle text-center">AKSI</th></tr>`;

      document.getElementById("headTabelSederhana").innerHTML = headerHTML;

      let bodyHTML = "";

      for (let b = 1; b < dataMentah2D.length; b++) {
        if (dataMentah2D[b].join("") === "") continue;

        let idLaporan = dataMentah2D[b][0];
        bodyHTML += `<tr>`;

        dataMentah2D[b].forEach((isiCell) => {
          bodyHTML += `<td>${isiCell}</td>`;
        });

        bodyHTML += `<td class="text-center align-middle">
               <button class="btn btn-sm text-white shadow-sm" style="background-color: #196666; border-radius:8px; padding:6px 14px;" onclick="editBaris('${idLaporan}')">
                   <i class="fas fa-pen mr-1"></i> Edit
               </button>
            </td></tr>`;
      }

      document.getElementById("bodyTabelSederhana").innerHTML = bodyHTML;
    }

    let modalEditAktif;

    function editBaris(id) {
      document.getElementById("editLaporanId").value = id;
      document.getElementById("editLaporanKet").value = "";

      if (!modalEditAktif) {
        modalEditAktif = new bootstrap.Modal(document.getElementById('modalEditLaporan'));
      }
      modalEditAktif.show();
    }

    function simpanEditKeServer() {
      let id = document.getElementById("editLaporanId").value;
      let statusBaru = document.getElementById("editLaporanStatus").value;
      let ketBaru = document.getElementById("editLaporanKet").value;

      modalEditAktif.hide();

       document.getElementById("bodyTabelSederhana").innerHTML = `<tr><td colspan="10" class="loading-text"><i class="fas fa-spinner fa-spin"></i> Menyimpan perubahan ke server...</td></tr>`;
      // Kirim perintah ke Code.gs
      google.script.run
         .withSuccessHandler(function(res) {
             alert("Data berhasil diperbarui!");
             muatUlangTabel();
         })
         .withFailureHandler(function(err) {
             alert("Gagal mengupdate: " + err.message);
             muatUlangTabel();
         })
         .updateStatusAdmin(id, statusBaru, ketBaru);
    }

    function filterTabel() {
      const input = document.getElementById("searchInput");
      const filter = input.value.toLowerCase();
      const rows = document.getElementById("bodyTabelSederhana").getElementsByTagName("tr");

      for (let i = 0; i < rows.length; i++) {
        const firstCell = rows[i].getElementsByTagName("td")[0];

        if (firstCell) {
          const txtValue = firstCell.textContent || firstCell.innerText;
            rows[i].style.display = (txtValue.toLowerCase().indexOf(filter) > -1) ? "" : "none";
          }
        }
      }

    document.addEventListener("DOMContentLoaded", initHalaman);
  </script>

</body>
</html>
